name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p site
          cp index.html site/
          cp cuatro-padel-performance.html site/
          cp cuatro-padel-performance.css site/
          cp cuatro-padel-performance.js site/
          cp cuatro-firebase.js site/
          cp performance-data.js site/
          cp rutinas-limpias.md site/
          cp rutinas-completas.json site/
          touch site/.nojekyll
          cat > site/cuatro-firebase-config.js <<'EOF'
          window.CUATRO_FIREBASE_CONFIG = {
            apiKey: "${{ secrets.VITE_FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ secrets.VITE_FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.VITE_FIREBASE_APP_ID }}",
            measurementId: "${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}"
          };
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
